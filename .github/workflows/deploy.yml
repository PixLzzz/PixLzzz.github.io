name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from the GitHub Actions tab

permissions:
  contents: write # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export data snapshot
        # export_data.py writes frontend/public/data.json which is included
        # in the static build; running from repo root so Python can find the DB
        run: python export_data.py

      - name: Build (static mode)
        run: npm run build
        working-directory: frontend
        env:
          VITE_STATIC: 'true'

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
