name: Scrape & Update Listings

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run scrapers
        run: python scrape_and_export.py

      - name: Commit updated data.json
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json frontend/public/state.json
          if git diff --cached --quiet; then
            echo "No new listings — skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(python3 -c "import json; print(len(json.load(open('frontend/public/data.json'))))")
            git commit -m "Auto-update: $COUNT listings ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Deploy to GitHub Pages directly (GITHUB_TOKEN commits don't trigger other workflows)
      - name: Setup Node.js
        if: steps.commit.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.commit.outputs.changed == 'true'
        run: npm ci
        working-directory: frontend

      - name: Build frontend (static mode)
        if: steps.commit.outputs.changed == 'true'
        run: npm run build
        working-directory: frontend
        env:
          VITE_STATIC: 'true'

      - name: Deploy to gh-pages
        if: steps.commit.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
