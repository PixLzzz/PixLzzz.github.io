name: Scrape & Update Listings

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run scrapers
        run: python scrape_and_export.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json
          if git diff --cached --quiet; then
            echo "No new listings — skipping commit."
          else
            COUNT=$(python3 -c "import json; print(len(json.load(open('frontend/public/data.json'))))")
            git commit -m "Auto-update: $COUNT listings ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
